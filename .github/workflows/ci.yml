name: GATO CI
on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /root/projects/gato
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
