name: gato
description: GATO MVP - Offline-first Flutter app for informal African sellers
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.5
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.0
  flutter_markdown_editor: ^2.0.0
  permission_handler: ^11.2.0
  audio_session: ^0.1.18
  flutter_tts: ^4.0.0
  speech_to_text: ^6.6.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.4
  go_router: ^14.0.0
  riverpod_annotation: ^2.3.5
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.10
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.10
  json_annotation: ^4.9.0
  json_generator: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env
